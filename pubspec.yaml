name: crop_check_up
description: "CropCheckUp - AI-powered plant disease detection"
publish_to: 'none'
version: 1.0.0+1
homepage: https://github.com/rasagyavatsal/CropCheckUp
repository: https://github.com/rasagyavatsal/CropCheckUp
issue_tracker: https://github.com/rasagyavatsal/CropCheckUp/issues

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  tflite_flutter: ^0.11.0
  camera: ^0.11.1
  image: ^4.9.1
  path_provider: ^2.1.5
  google_fonts: ^8.1.0
  image_picker: ^1.1.2
  image_background_remover: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.5

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default:21

flutter:
  uses-material-design: true

  assets:
    - assets/plant_disease_model.tflite
    - assets/labels.txt
    - assets/disease_info.json
    - assets/logo.png
